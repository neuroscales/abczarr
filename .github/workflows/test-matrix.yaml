name: Run matrix of tests
description: Run matrix of tests

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Commit / Branch / Tag / SHA to checkout'
        required: false
        default: ''

  workflow_call:
    inputs:
      tag:
        description: 'Commit / Branch / Tag / SHA to checkout'
        required: false
        default: ''
        type: string

jobs:
  test:
    strategy:
      matrix:
        include:
          - python-version: "3.8"
          - python-version: "3.14"

    uses: ./.github/workflows/test.yaml
    with:
      tag: ${{ inputs.tag }}
      python-version: ${{ matrix.python-version }}
